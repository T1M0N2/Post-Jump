<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Post Jump</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;touch-action:none;overflow:hidden;font-family:-apple-system,sans-serif}
#game-wrap{position:relative;width:100%;max-width:600px}
canvas{display:block;width:100%;height:auto;image-rendering:pixelated;image-rendering:crisp-edges}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;display:none}
#overlay.show{display:flex}
#msg{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#ccc;text-align:center;line-height:1.8}
/* top-right HUD */
#hud-tr{position:absolute;top:8px;right:10px;text-align:right;line-height:1.4}
#hi-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#555}
#hi-val{font-size:13px;font-weight:700;color:#777;font-variant-numeric:tabular-nums;display:block}
/* title */
#title{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#555;white-space:nowrap}
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="overlay" class="show">
    <div id="msg">Drücke <b>Leertaste</b> oder <b>Tippen</b></div>
  </div>
  <div id="hud-tr">
    <span id="hi-label">HI</span>
    <span id="hi-val">00000</span>
  </div>
  <div id="title">POST — JUMP</div>
</div>

<script>
// ── Canvas ────────────────────────────────────────────────────
const C=document.getElementById('c');
const X=C.getContext('2d');
const W=600,H=130;
C.width=W; C.height=H;

// ── Constants ─────────────────────────────────────────────────
const GROUND=92;   // y of the ground surface (player stands here)
const PW=24,PH=28; // player width/height
const GRAV=0.65;
const JUMP_V=-13;
const FALL_LIMIT=H+40; // if player falls below this → die

// ── State ─────────────────────────────────────────────────────
// 'idle' | 'running' | 'dead'
let state='idle';
let raf=null;
let frame=0;

let score=0;
let best=+localStorage.getItem('pj_hi')||0;
const hiEl=document.getElementById('hi-val');
const overlay=document.getElementById('overlay');
const msgEl=document.getElementById('msg');

// ── Level config ───────────────────────────────────────────────
// Each level: {scoreThreshold, label, baseSpeed, hasPits, hasBirds, flashCol}
const LEVELS=[
  {t:0,   label:'LVL 1 — Warm up',   spd:5.5, pits:false, birds:false, col:'#55aaff'},
  {t:150, label:'LVL 2 — Pick it up',spd:7,   pits:false, birds:false, col:'#55ff99'},
  {t:350, label:'LVL 3 — Watch out!', spd:8.5, pits:true,  birds:false, col:'#ffcc44'},
  {t:600, label:'LVL 4 — Danger!',   spd:10,  pits:true,  birds:true,  col:'#ff8844'},
  {t:900, label:'LVL 5 — INSANE',    spd:12,  pits:true,  birds:true,  col:'#ff4455'},
];
let lvl=0; // current level index
let levelFlash=0; // frames to show level banner

// ── Player ────────────────────────────────────────────────────
const P={x:70, y:GROUND, vy:0, onGround:true};

// ── Entities ──────────────────────────────────────────────────
let obstacles=[];  // {x,y,w,h,variant}
let birds=[];      // {x,y,w,h}
let pits=[];       // {x,w}  — gaps in the ground
let groundX=0;

let nextObs=70;
let nextBird=500;
let nextPit=400;

// ── Clouds ────────────────────────────────────────────────────
const clouds=[];
for(let i=0;i<4;i++) clouds.push({x:80+i*155,y:12+Math.random()*22,w:38+Math.random()*28});

// ── Helpers ───────────────────────────────────────────────────
function pad(n,d){return String(Math.floor(n)).padStart(d,'0');}

function updateHUD(){
  hiEl.textContent=pad(Math.max(score,best),5);
  const l=LEVELS[lvl];
}

function collides(ax,ay,aw,ah,bx,by,bw,bh){
  const m=4;
  return ax+m<bx+bw && ax+aw-m>bx && ay+m<by+bh && ay+ah-m>by;
}

// ── Spawn helpers ─────────────────────────────────────────────
function spawnObs(){
  const v=Math.floor(Math.random()*3);
  const h=[26,32,28][v];
  const w=[14,26,20][v];
  const double=score>300&&Math.random()<0.22;
  const oy=GROUND+PH-h; // sits on the ground
  obs.push({x:W+8,y:oy,w,h,v});
  if(double) obs.push({x:W+8+w+10,y:oy,w,h,v});
}
// alias so I can use both names
let obs=obstacles;

function spawnBird(){
  // Low bird (must jump over) or high bird (run under — but no crouch, so just avoid)
  const hy=Math.random()<0.5 ? GROUND-20 : GROUND+4;
  birds.push({x:W+8,y:hy,w:38,h:18});
}

function spawnPit(){
  // A gap in the ground — player must jump over it
  const pw=30+Math.random()*20;
  pits.push({x:W+8,w:pw,alive:true});
}

// ── Reset / start ─────────────────────────────────────────────
function startGame(){
  // Cancel any existing loop first
  if(raf!==null){cancelAnimationFrame(raf);raf=null;}

  state='running';
  frame=0; score=0; lvl=0; levelFlash=0;
  obs=[]; obstacles=obs; birds=[]; pits=[];
  P.x=70; P.y=GROUND; P.vy=0; P.onGround=true;
  groundX=0;
  nextObs=70; nextBird=500; nextPit=400;
  overlay.classList.remove('show');
  updateHUD();
  raf=requestAnimationFrame(loop);
}

function die(){
  if(state==='dead')return; // guard against double-call
  state='dead';
  cancelAnimationFrame(raf); raf=null;
  if(score>best){best=score;localStorage.setItem('pj_hi',best);}
  updateHUD();
  msgEl.innerHTML=`GAME OVER &nbsp;·&nbsp; Score: <b>${pad(score,5)}</b><br>Tippen oder Leertaste`;
  overlay.classList.add('show');
  // Draw one last frame with player faded
  drawFrame(true);
}

// ── Input ─────────────────────────────────────────────────────
function doAction(){
  if(state==='idle'||state==='dead'){startGame();return;}
  if(state==='running'&&P.onGround){
    P.vy=JUMP_V;
    P.onGround=false;
  }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doAction();}
});
document.addEventListener('touchstart',e=>{e.preventDefault();doAction();},{passive:false});
C.addEventListener('click',doAction);

// ── Drawing ───────────────────────────────────────────────────
function drawClouds(){
  X.fillStyle='#2e2e2e';
  for(const cl of clouds){
    X.fillRect(cl.x,cl.y,cl.w,5);
    X.fillRect(cl.x+7,cl.y-3,cl.w-14,3);
    cl.x-=0.9;
    if(cl.x<-cl.w-10)cl.x=W+cl.w;
  }
}

function drawGround(activeSpeed){
  const sp=activeSpeed||0;
  // Draw ground segments — skip over pit gaps
  X.fillStyle='#555';
  // Full ground line, then we'll "cut" pits by drawing background over them
  X.fillRect(0,GROUND+PH,W,2);

  // Scrolling pebbles
  X.fillStyle='#3a3a3a';
  const off=Math.floor(groundX)%36;
  for(let x=-off;x<W;x+=36){
    // check if this x is inside a pit — skip
    let inPit=false;
    for(const p of pits){if(x>=p.x-4&&x<=p.x+p.w+4){inPit=true;break;}}
    if(!inPit){
      X.fillRect(x,GROUND+PH+4,12,2);
      X.fillRect(x+20,GROUND+PH+7,6,1);
    }
  }

  // Draw pits — erase ground line and fill with dark void
  for(const p of pits){
    // Black void below pit
    X.fillStyle='#0d0d0d';
    X.fillRect(p.x,GROUND+PH-2,p.w,H-(GROUND+PH-2));
    // Erase the ground line over the pit
    X.fillStyle='#1a1a1a';
    X.fillRect(p.x,GROUND+PH,p.w,3);
    // Pit edge shadows
    X.fillStyle='#333';
    X.fillRect(p.x-2,GROUND+PH,2,8);
    X.fillRect(p.x+p.w,GROUND+PH,2,8);
  }
}

function drawPlayer(dead){
  X.globalAlpha=dead?0.35:1;
  const px=Math.round(P.x), py=Math.round(P.y);
  // Body
  X.fillStyle='#e0e0e0';
  X.fillRect(px,py,PW,PH);
  // Shade right side
  X.fillStyle='rgba(0,0,0,0.15)';
  X.fillRect(px+PW-7,py,7,PH);
  // Visor
  X.fillStyle='#111';
  X.fillRect(px+3,py+5,PW-6,8);
  X.fillStyle=lvl>=2?LEVELS[lvl].col:'#55aaff';
  X.fillRect(px+4,py+6,PW-11,6);
  // Visor glare
  X.fillStyle='rgba(255,255,255,0.35)';
  X.fillRect(px+5,py+7,5,2);
  // Legs animated
  const lg=state==='running'?Math.floor(frame/5)%2:0;
  X.fillStyle='#aaa';
  X.fillRect(px+3,   py+PH, 7, lg===0?8:4);
  X.fillRect(px+PW-10,py+PH, 7, lg===0?4:8);
  // Boots
  X.fillStyle='#888';
  X.fillRect(px+2,   py+PH+(lg===0?8:4), 9, 3);
  X.fillRect(px+PW-11,py+PH+(lg===0?4:8),9, 3);
  // Arms
  X.fillStyle='#bbb';
  X.fillRect(px-3,py+7,4,10);
  X.fillRect(px+PW-1,py+7,4,10);
  X.globalAlpha=1;
}

function drawObs(o){
  X.fillStyle='#d0d0d0';
  const mx=o.x+Math.floor(o.w/2)-3;
  X.fillRect(mx,o.y,6,o.h); // stem
  if(o.v===0){
    X.fillRect(o.x,o.y+7,o.w,5);
  } else if(o.v===1){
    X.fillRect(o.x,o.y+9,7,o.h-9);
    X.fillRect(o.x+o.w-7,o.y+13,7,o.h-13);
    X.fillRect(o.x,o.y+9,o.w,4);
  } else {
    X.fillRect(o.x,o.y+7,7,o.h-7);
    X.fillRect(o.x+o.w-7,o.y+11,7,o.h-11);
    X.fillRect(o.x,o.y+7,o.w,4);
  }
}

function drawBird(b){
  const flap=Math.floor(frame/7)%2;
  X.fillStyle='#c8c8c8';
  X.fillRect(b.x+7,b.y+5,18,7); // body
  X.fillRect(b.x+23,b.y+3,8,5); // head
  X.fillRect(b.x+29,b.y+5,6,3); // beak
  X.fillRect(b.x,flap?b.y+9:b.y, 34,5); // wing
}

function drawScore(){
  X.fillStyle='#5a5a5a';
  X.font='bold 13px monospace';
  X.textAlign='left';
  X.textBaseline='top';
  X.fillText(pad(score,5),10,8);
}

function drawLevelFlash(){
  if(levelFlash>0){
    const alpha=Math.min(1,levelFlash/20);
    X.globalAlpha=alpha;
    X.fillStyle=LEVELS[lvl].col;
    X.font='bold 11px -apple-system,monospace';
    X.textAlign='center';
    X.textBaseline='middle';
    X.fillText(LEVELS[lvl].label, W/2, H/2-10);
    X.globalAlpha=1;
    levelFlash--;
  }
}

// Single draw pass — called from loop and once from die()
function drawFrame(dead){
  X.clearRect(0,0,W,H);
  drawClouds();
  drawGround();
  for(const o of obs)drawObs(o);
  for(const b of birds)drawBird(b);
  drawPlayer(!!dead);
  drawScore();
  drawLevelFlash();
}

// ── Main loop ─────────────────────────────────────────────────
function loop(){
  raf=requestAnimationFrame(loop);
  frame++;

  const curLvl=LEVELS[lvl];
  const spd=curLvl.spd;

  // ── Level check ──
  for(let i=LEVELS.length-1;i>=0;i--){
    if(score>=LEVELS[i].t&&i!==lvl){
      lvl=i;
      levelFlash=80;
      updateHUD();
      break;
    }
  }

  // ── Score ──
  if(frame%6===0){score++;if(frame%30===0)updateHUD();}

  // ── Physics ──
  P.vy+=GRAV;
  P.y+=P.vy;

  // Landing: check if player is above a pit or solid ground
  if(P.vy>=0){
    const footX=P.x+PW/2;
    const groundY=GROUND;
    let overPit=false;
    for(const p of pits){
      // foot X is inside pit horizontally?
      if(footX>p.x+3&&footX<p.x+p.w-3){overPit=true;break;}
    }
    if(!overPit&&P.y>=groundY){
      P.y=groundY;P.vy=0;P.onGround=true;
    }
  }

  // Fall into pit → die
  if(P.y>FALL_LIMIT){die();return;}

  // ── Ground scroll ──
  groundX+=spd;

  // ── Spawn obstacles ──
  nextObs--;
  if(nextObs<=0){
    spawnObs();
    nextObs=Math.floor(55+Math.random()*70+(180/spd)*1.8);
  }

  // ── Spawn birds ──
  if(curLvl.birds){
    nextBird--;
    if(nextBird<=0){
      spawnBird();
      nextBird=Math.floor(100+Math.random()*160);
    }
  }

  // ── Spawn pits ──
  if(curLvl.pits){
    nextPit--;
    if(nextPit<=0){
      // Only spawn pit if no obstacle is close to landing zone
      const safe=!obs.some(o=>o.x>W-60&&o.x<W+20);
      if(safe)spawnPit();
      nextPit=Math.floor(130+Math.random()*180);
    }
  }

  // ── Move entities ──
  obs.forEach(o=>o.x-=spd);
  birds.forEach(b=>b.x-=spd+1.2);
  pits.forEach(p=>p.x-=spd);

  obs=obs.filter(o=>o.x>-60);
  birds=birds.filter(b=>b.x>-60);
  pits=pits.filter(p=>p.x+p.w>-10);
  // keep the global alias in sync
  obstacles=obs;

  // ── Collisions ──
  for(const o of obs){
    if(collides(P.x,P.y,PW,PH,o.x,o.y,o.w,o.h)){die();return;}
  }
  for(const b of birds){
    if(collides(P.x,P.y,PW,PH,b.x,b.y,b.w,b.h)){die();return;}
  }

  // ── Draw ──
  drawFrame(false);
}

// ── Initial idle frame ────────────────────────────────────────
(function(){
  X.clearRect(0,0,W,H);
  drawClouds();
  drawGround();
  X.fillStyle='#e0e0e0';
  X.fillRect(P.x,P.y,PW,PH);
  X.fillStyle='#111';
  X.fillRect(P.x+3,P.y+5,PW-6,8);
  X.fillStyle='#55aaff';
  X.fillRect(P.x+4,P.y+6,PW-11,6);
  X.fillStyle='#aaa';
  X.fillRect(P.x+3,P.y+PH,7,8);X.fillRect(P.x+PW-10,P.y+PH,7,4);
  updateHUD();
})();
</script>
</body>
</html>
