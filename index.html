<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Jump</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07070f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#wrap{width:680px;max-width:100vw;display:flex;flex-direction:column}

/* HUD */
#hud{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:#0f0f1e;border-bottom:1px solid #1e1e3a}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:2px}
.hud-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#44445a;font-weight:600}
.hud-val{font-size:20px;font-weight:800;color:#f0f0ff;font-variant-numeric:tabular-nums;line-height:1}
#lives-row{display:flex;gap:5px}
.heart{font-size:15px;transition:transform .2s}
.heart.lost{opacity:.25;transform:scale(.8)}
#lvl-badge{font-size:11px;padding:3px 10px;border-radius:100px;background:#1a1a3a;color:#7c7cff;font-weight:700;letter-spacing:.06em;border:1px solid #2a2a5a}

/* Canvas */
canvas{display:block;width:100%;image-rendering:pixelated}

/* Overlay screens */
.screen{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 24px;background:#0f0f1e;border-top:1px solid #1e1e3a}
.screen.hidden{display:none}
#logo{font-size:44px;font-weight:900;letter-spacing:-.04em;color:#fff;line-height:1}
#logo span{color:#f4a024}
#logo small{display:block;font-size:12px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#555;margin-top:4px}
.screen-sub{font-size:13px;color:#555;text-align:center;max-width:360px;line-height:1.7}
.screen-sub b{color:#888}
.btn{padding:13px 36px;border-radius:100px;border:none;font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s,box-shadow .12s;letter-spacing:.02em}
.btn:active{transform:scale(.96)}
#btn-start{background:linear-gradient(135deg,#f4a024,#e85c24);color:#0a0a0f;box-shadow:0 4px 20px rgba(244,160,36,.35)}
#btn-restart{background:linear-gradient(135deg,#f4a024,#e85c24);color:#0a0a0f;box-shadow:0 4px 20px rgba(244,160,36,.35)}
.tip{font-size:11px;color:#333;letter-spacing:.06em;text-transform:uppercase}

/* Game over */
#go-title{font-size:36px;font-weight:900;letter-spacing:-.02em;color:#e84040;text-shadow:0 0 24px rgba(232,64,64,.4)}
#go-score{font-size:15px;color:#999}
#go-score strong{color:#fff;font-size:22px;font-weight:800}
#go-best{font-size:13px;color:#f4a024;font-weight:600}
.go-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:260px}
.stat-card{background:#181828;border-radius:10px;padding:12px 16px;text-align:center;border:1px solid #252540}
.stat-card .sv{font-size:22px;font-weight:800;color:#fff}
.stat-card .sk{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* Speed pulse */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.lvl-up-flash{animation:pulse .3s 3}
</style>
</head>
<body>
<div id="wrap">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-val" id="h-score">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">Best</span>
      <span class="hud-val" id="h-best">0</span>
    </div>
    <div class="hud-block" style="gap:4px">
      <span class="hud-label">Speed</span>
      <div id="lvl-badge">LVL 1</div>
    </div>
    <div class="hud-block">
      <span class="hud-label">Lives</span>
      <div id="lives-row"></div>
    </div>
  </div>

  <!-- Game canvas -->
  <canvas id="c" width="680" height="210"></canvas>

  <!-- Start screen -->
  <div class="screen" id="start-screen">
    <div id="logo">Post <span>Jump</span><small>⚡ Side Runner</small></div>
    <div class="screen-sub">
      Ausweichen, springen, überleben.<br>
      <b>Leertaste / Tap</b> zum Springen.<br>
      Ab Level 3: <b>Doppelsprung</b> freigeschaltet!
    </div>
    <button class="btn" id="btn-start">▶ Start</button>
    <div class="tip">Space · Tap · Click</div>
  </div>

  <!-- Game over screen -->
  <div class="screen hidden" id="go-screen">
    <div id="go-title">GAME OVER</div>
    <div class="go-stats">
      <div class="stat-card"><div class="sv" id="gs-score">0</div><div class="sk">Score</div></div>
      <div class="stat-card"><div class="sv" id="gs-best">0</div><div class="sk">Best</div></div>
      <div class="stat-card"><div class="sv" id="gs-lvl">1</div><div class="sk">Level</div></div>
      <div class="stat-card"><div class="sv" id="gs-coins">0</div><div class="sk">Coins</div></div>
    </div>
    <div id="go-best"></div>
    <button class="btn" id="btn-restart">↺ Nochmal</button>
  </div>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=680,H=210,GY=155; // ground Y (top of ground)
const GRAV=.58,J1=-13.5,J2=-10.5;
let raf,running=false,frame=0;
let score=0,coins_collected=0,best=+localStorage.getItem('pj2_best')||0;
let lives=3,speed=5,lvl=1,scoreTimer=0;
let flashAlpha=0;
let levelUpMsg='',levelUpTimer=0;

// Player state
const P={x:80,y:GY,vy:0,jumps:0,maxJumps:1,invincible:0};

// Entity arrays
let obstacles=[];
let coins=[];
let particles=[];
let groundSegs=[];
let clouds=[];

// Init ground decorations
for(let i=0;i<20;i++) groundSegs.push({x:i*38,w:22,h:3+Math.random()*4});
for(let i=0;i<5;i++) clouds.push({x:Math.random()*W,y:20+Math.random()*50,w:60+Math.random()*80,opa:0.04+Math.random()*.06,sp:0.15+Math.random()*.25});

// Stars
const stars=[];
for(let i=0;i<80;i++) stars.push({x:Math.random()*W,y:Math.random()*(GY-10),s:.5+Math.random()*1.5,sp:.08+Math.random()*.35,twinkle:Math.random()*Math.PI*2});

// ── Obstacle types ──────────────────────────────
const OBS_TYPES=[
  {w:22,h:55,col:'#2d7a2d',top:'#3da83d',lbl:'🌵'},
  {w:18,h:72,col:'#1e5c48',top:'#28845a',lbl:'🪨'},
  {w:32,h:36,col:'#8c3030',top:'#c84040',lbl:'🔥'},
  {w:50,h:24,col:'#4a2a8c',top:'#6a3ab8',lbl:'⚡'},
  {w:26,h:60,col:'#5a3a1a',top:'#8c5c28',lbl:'🪵'},
];

// ── Helpers ─────────────────────────────────────
function rng(min,max){return min+Math.random()*(max-min);}
function overlap(ax,ay,aw,ah,bx,by,bw,bh,m){
  m=m||0;
  return ax+m<bx+bw&&ax+aw-m>bx&&ay+m<by+bh&&ay+ah-m>by;
}

// ── Particles ────────────────────────────────────
function burst(x,y,col,n,vscale){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,v=(1+Math.random()*3)*vscale;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,life:20+Math.random()*15,maxLife:35,col});
  }
}
function jumpDust(){
  for(let i=0;i<10;i++) particles.push({x:P.x+P.w*.5,y:P.y+50,vx:(Math.random()-.5)*4,vy:-1-Math.random()*2,life:14,maxLife:14,col:'#444470'});
}

// ── Spawn ─────────────────────────────────────────
function spawnObs(){
  const t={...OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)]};
  obstacles.push({x:W+30,y:GY-t.h+50,w:t.w,h:t.h,col:t.col,top:t.top});
}
function spawnCoin(){
  coins.push({x:W+20,y:rng(GY-90,GY-25),r:7,alive:true,bob:Math.random()*Math.PI*2,rot:0});
}
function maybeCoin(){if(Math.random()<.55)spawnCoin();}

// ── Reset ─────────────────────────────────────────
function reset(){
  P.x=80;P.y=GY;P.vy=0;P.jumps=0;P.maxJumps=1;P.invincible=0;
  obstacles=[];coins=[];particles=[];
  score=0;coins_collected=0;lives=3;speed=5;lvl=1;frame=0;flashAlpha=0;levelUpTimer=0;
  updateHUD();
}

// ── Input ──────────────────────────────────────────
function doJump(){
  if(!running)return;
  if(P.jumps<P.maxJumps){
    P.vy=P.jumps===0?J1:J2;
    P.jumps++;
    jumpDust();
  }
}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();doJump();}});
C.addEventListener('click',doJump);
document.addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});
document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-restart').addEventListener('click',startGame);

// ── HUD ────────────────────────────────────────────
function updateHUD(){
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-best').textContent=Math.max(score,best);
  document.getElementById('lvl-badge').textContent='LVL '+lvl;
  const lr=document.getElementById('lives-row');
  lr.innerHTML='';
  for(let i=0;i<3;i++){
    const s=document.createElement('span');
    s.className='heart'+(i>=lives?' lost':'');
    s.textContent='♥';
    s.style.color=i<lives?'#e84040':'#333';
    lr.appendChild(s);
  }
}

// ── Draw helpers ───────────────────────────────────
function roundRect(x,y,w,h,r){
  X.beginPath();
  X.moveTo(x+r,y);
  X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);
  X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);
  X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);
  X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);
  X.closePath();
}

// ── Draw background ────────────────────────────────
function drawBG(){
  // Sky
  const sky=X.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#06061a');
  sky.addColorStop(1,'#0e0e30');
  X.fillStyle=sky;X.fillRect(0,0,W,GY);

  // Stars
  for(const s of stars){
    s.twinkle+=.04;
    X.globalAlpha=(.3+Math.sin(s.twinkle)*.2);
    X.fillStyle='#cce';
    X.beginPath();X.arc(s.x,s.y,s.s,0,Math.PI*2);X.fill();
    s.x-=s.sp;
    if(s.x<-2){s.x=W+2;s.y=Math.random()*(GY-10);}
  }
  X.globalAlpha=1;

  // Clouds
  for(const cl of clouds){
    X.fillStyle=`rgba(180,180,255,${cl.opa})`;
    roundRect(cl.x,cl.y,cl.w,18,9);X.fill();
    cl.x-=cl.sp;
    if(cl.x<-cl.w){cl.x=W+cl.w;}
  }

  // Ground
  const gGrad=X.createLinearGradient(0,GY,0,H);
  gGrad.addColorStop(0,'#181830');gGrad.addColorStop(1,'#0a0a18');
  X.fillStyle=gGrad;X.fillRect(0,GY,W,H-GY);

  // Ground edge glow
  X.strokeStyle='rgba(100,100,255,.25)';X.lineWidth=1.5;
  X.beginPath();X.moveTo(0,GY+50);X.lineTo(W,GY+50);X.stroke();

  // Scrolling ground tiles
  const off=(frame*speed*.6)%48;
  X.fillStyle='#1e1e40';
  for(const g of groundSegs){
    g.x-=speed*.6;
    if(g.x<-40)g.x=W+20;
    X.fillRect(g.x,GY+50,g.w,g.h);
  }
}

// ── Draw player ─────────────────────────────────────
function drawPlayer(){
  if(P.invincible>0&&Math.floor(P.invincible/5)%2)return;
  const px=Math.round(P.x),py=Math.round(P.y);
  const onGround=P.y>=GY-1;
  const airTime=!onGround;

  // Shadow on ground
  const sdist=Math.max(0,1-(P.y-(GY-50))/50);
  if(sdist>0){
    X.globalAlpha=sdist*.4;
    X.fillStyle='#000';
    X.beginPath();X.ellipse(px+22,GY+52,18*sdist,5*sdist,0,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }

  // Jetpack glow while airborne
  if(airTime&&P.vy<0){
    X.shadowColor='#f4a024';X.shadowBlur=20;
  }

  // Body
  X.fillStyle='#f4a024';
  roundRect(px+2,py,38,46,7);X.fill();
  X.shadowBlur=0;

  // Body shade
  X.fillStyle='rgba(0,0,0,.18)';
  roundRect(px+22,py,18,46,7);X.fill();

  // Visor
  X.fillStyle='#0a0a1e';roundRect(px+7,py+9,26,14,5);X.fill();
  const vgrd=X.createLinearGradient(0,py+9,0,py+23);
  vgrd.addColorStop(0,'#66ccff');vgrd.addColorStop(1,'#0066aa');
  X.fillStyle=vgrd;roundRect(px+9,py+11,22,10,3);X.fill();
  // Visor glare
  X.fillStyle='rgba(255,255,255,.4)';
  X.fillRect(px+11,py+12,7,3);

  // Legs with walk cycle
  const legSwing=onGround?Math.sin(frame*.22)*8:0;
  X.fillStyle='#c07010';
  X.fillRect(px+6,py+46,12,10+Math.max(0,legSwing));
  X.fillRect(px+22,py+46,12,10+Math.max(0,-legSwing));
  // Boots
  X.fillStyle='#805010';
  X.fillRect(px+4,py+52+Math.max(0,legSwing),15,5);
  X.fillRect(px+20,py+52+Math.max(0,-legSwing),15,5);

  // Antenna
  X.strokeStyle='#aaa';X.lineWidth=1.5;
  X.beginPath();X.moveTo(px+22,py);X.lineTo(px+24,py-8);X.stroke();
  X.fillStyle=lvl>=3?'#ff44ff':'#f4a024';
  X.beginPath();X.arc(px+24,py-10,3,0,Math.PI*2);X.fill();
}

// ── Draw obstacles ──────────────────────────────────
function drawObstacles(){
  for(const o of obstacles){
    // Shadow
    X.globalAlpha=.3;X.fillStyle='#000';
    X.beginPath();X.ellipse(o.x+o.w/2,GY+52,o.w/2+3,5,0,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
    // Body
    X.fillStyle=o.col;roundRect(o.x,o.y,o.w,o.h,5);X.fill();
    // Top highlight
    X.fillStyle=o.top;roundRect(o.x+3,o.y+3,o.w-6,7,3);X.fill();
    // Left edge light
    X.fillStyle='rgba(255,255,255,.07)';X.fillRect(o.x,o.y,3,o.h);
  }
}

// ── Draw coins ──────────────────────────────────────
function drawCoins(){
  for(const c of coins){
    if(!c.alive)continue;
    c.bob+=.07;c.rot+=.06;
    const cy=c.y+Math.sin(c.bob)*5;
    // Glow
    X.shadowColor='#ffe066';X.shadowBlur=14;
    // Coin circle
    X.fillStyle='#ffe066';
    X.beginPath();X.arc(c.x,cy,c.r,0,Math.PI*2);X.fill();
    X.strokeStyle='#c87800';X.lineWidth=1.5;
    X.beginPath();X.arc(c.x,cy,c.r,0,Math.PI*2);X.stroke();
    X.shadowBlur=0;
    // Symbol
    X.fillStyle='#a06000';X.font='bold 9px sans-serif';X.textAlign='center';X.textBaseline='middle';
    X.fillText('$',c.x,cy);
  }
}

// ── Draw particles ──────────────────────────────────
function drawParticles(){
  for(const p of particles){
    X.globalAlpha=p.life/p.maxLife;
    X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,2.5,0,Math.PI*2);X.fill();
    p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life--;
  }
  X.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
}

// ── Draw HUD overlays ───────────────────────────────
function drawOverlays(){
  // Score watermark
  X.globalAlpha=.07;
  X.fillStyle='#fff';
  X.font='bold 80px -apple-system,sans-serif';
  X.textAlign='right';X.textBaseline='middle';
  X.fillText(score,W-20,GY/2+10);
  X.globalAlpha=1;

  // Flash on hit
  if(flashAlpha>0){
    X.fillStyle=`rgba(220,40,40,${flashAlpha})`;
    X.fillRect(0,0,W,H);
    flashAlpha=Math.max(0,flashAlpha-.04);
  }

  // Level-up message
  if(levelUpTimer>0){
    X.globalAlpha=Math.min(1,levelUpTimer/10);
    X.fillStyle='#fff';
    X.font='bold 20px -apple-system,sans-serif';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText(levelUpMsg,W/2,GY/2);
    X.globalAlpha=1;
    levelUpTimer--;
  }
}

// ── Main game loop ───────────────────────────────────
function gameLoop(){
  frame++;
  X.clearRect(0,0,W,H);
  drawBG();
  drawOverlays();

  // Level / speed ramp
  const newLvl=Math.min(10,1+Math.floor(score/180));
  if(newLvl!==lvl){
    lvl=newLvl;
    speed=Math.min(14,5+lvl*1);
    P.maxJumps=lvl>=3?2:1;
    levelUpMsg=lvl>=3?`LEVEL ${lvl} — Double Jump!`:`LEVEL ${lvl} — Speed up!`;
    levelUpTimer=60;
    updateHUD();
  }

  // Spawn obstacles
  const lastO=obstacles.length?obstacles[obstacles.length-1]:null;
  const minGap=Math.max(140,260-lvl*10);
  if(!lastO||W+30-lastO.x>minGap+rng(0,100)){
    if(Math.random()<.85){spawnObs();if(Math.random()<.4)maybeCoin();}
  }
  if(frame%100===0&&Math.random()<.4)spawnCoin();

  // Move everything
  for(const o of obstacles)o.x-=speed;
  for(const c of coins)c.x-=speed*.75;
  obstacles=obstacles.filter(o=>o.x>-80);
  coins=coins.filter(c=>c.x>-20);

  // Physics
  P.vy+=GRAV;
  P.y+=P.vy;
  if(P.y>=GY){P.y=GY;P.vy=0;P.jumps=0;}
  if(P.invincible>0)P.invincible--;

  // Collision — obstacles
  if(P.invincible===0){
    for(const o of obstacles){
      if(overlap(P.x+4,P.y+4,34,42,o.x,o.y,o.w,o.h,5)){
        lives--;
        burst(P.x+20,P.y+25,'#f4a024',18,1);
        burst(P.x+20,P.y+25,'#e84040',10,1.5);
        flashAlpha=.5;
        P.invincible=90;
        updateHUD();
        if(lives<=0){endGame();return;}
        break;
      }
    }
  }

  // Collision — coins
  for(const c of coins){
    if(!c.alive)continue;
    if(overlap(P.x+4,P.y+4,34,42,c.x-c.r,c.y-c.r,c.r*2,c.r*2)){
      c.alive=false;score+=10;coins_collected++;
      burst(c.x,c.y,'#ffe066',10,1.2);
      updateHUD();
    }
  }

  // Score tick
  scoreTimer++;
  if(scoreTimer>=2){score++;scoreTimer=0;}
  if(frame%30===0)updateHUD();

  // Draw entities
  drawObstacles();
  drawCoins();
  drawPlayer();
  drawParticles();

  raf=requestAnimationFrame(gameLoop);
}

function startGame(){
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('go-screen').classList.add('hidden');
  reset();
  running=true;
  raf=requestAnimationFrame(gameLoop);
}

function endGame(){
  cancelAnimationFrame(raf);
  running=false;
  if(score>best){best=score;localStorage.setItem('pj2_best',best);}
  document.getElementById('gs-score').textContent=score;
  document.getElementById('gs-best').textContent=Math.max(score,best);
  document.getElementById('gs-lvl').textContent=lvl;
  document.getElementById('gs-coins').textContent=coins_collected;
  const gb=document.getElementById('go-best');
  gb.textContent=score>=best?'🏆 Neuer Highscore!':'Best: '+best;
  gb.style.color=score>=best?'#f4a024':'#666';
  document.getElementById('go-screen').classList.remove('hidden');
}

// Initial idle render
(function idleFrame(){
  X.clearRect(0,0,W,H);
  drawBG();
  X.fillStyle='#f4a024';roundRect(P.x,P.y,40,46,7);X.fill();
  X.fillStyle='#0a0a1e';roundRect(P.x+7,P.y+9,26,14,5);X.fill();
  X.fillStyle='#66ccff';roundRect(P.x+9,P.y+11,22,10,3);X.fill();
  X.fillStyle='#c07010';X.fillRect(P.x+6,P.y+46,12,10);X.fillRect(P.x+22,P.y+46,12,10);
})();
updateHUD();
</script>
</body>
</html>
